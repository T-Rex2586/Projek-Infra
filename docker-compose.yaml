version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow

  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__WEBSERVER__SECRET_KEY: my_super_secret_key_123

    AIRFLOW_CONN_DWH_CONN: postgresql://airflow:airflow@postgres-dwh:5432/dwh

    _PIP_ADDITIONAL_REQUIREMENTS: pandas>=2.0.0 requests>=2.31.0 psycopg2-binary>=2.9.9

    PLAYWRIGHT_BROWSERS_PATH: /opt/ms-playwright

    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "30"
    AIRFLOW__CORE__PARALLELISM: "16"
    AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "16"

  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./freya:/opt/airflow/freya

  depends_on:
    postgres:
      condition: service_healthy


services:

  # 🗄️ AIRFLOW METADATA DB
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5


  # 🗄️ DATA WAREHOUSE DB
  postgres-dwh:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: dwh
    volumes:
      - postgres_dwh_data:/var/lib/postgresql/data
      - ./dwh_init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5


  # ⚙️ AIRFLOW INIT (FIXED 100%)
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
      echo '⏳ Waiting DB...' &&
      sleep 10 &&
      airflow db migrate &&

      echo '👤 Creating admin user...' &&
      airflow users create --username admin --password admin \
      --firstname Admin --lastname User \
      --role Admin --email admin@example.com || true &&

      echo '✅ Airflow init done'
      "


  # 🌐 WEB SERVER
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8089:8080"
    depends_on:
      - airflow-init


  # 🧠 SCHEDULER
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init


  # 📊 METABASE
  metabase:
    image: metabase/metabase:latest
    ports:
      - "3010:3000"
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    depends_on:
      postgres-dwh:
        condition: service_healthy


volumes:
  postgres_data:
  postgres_dwh_data:
  metabase_data: