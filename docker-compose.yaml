version: '3.8'

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.8.1-python3.10
  environment:
    # 🔥 CORE AIRFLOW
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__WEBSERVER__SECRET_KEY=my_super_secret_key_123

    # 🔥 DWH CONNECTION
    - AIRFLOW_CONN_DWH_CONN=postgresql://airflow:airflow@postgres:5432/dwh

    # 🔥 DEPENDENCIES
    - _PIP_ADDITIONAL_REQUIREMENTS=pandas>=2.0.0 requests>=2.31.0 psycopg2-binary>=2.9.9 scrapy>=2.11.0 scrapy-playwright playwright itemadapter

    # 🔥 Playwright path
    - PLAYWRIGHT_BROWSERS_PATH=/opt/airflow/.cache/ms-playwright

  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./freya:/opt/airflow/freya

  depends_on:
    postgres:
      condition: service_healthy


services:

  # 🗄️ POSTGRES (PERSISTENT)
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data   # 🔥 FIX: persistence
      - ./dwh_init:/docker-entrypoint-initdb.d
    ports:
      - "5431:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5


  # ⚙️ INIT AIRFLOW (FIX USER + PLAYWRIGHT)
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
      airflow db migrate &&
      airflow users list | grep admin || airflow users create \
        --username admin \
        --password admin \
        --firstname Admin \
        --lastname User \
        --role Admin \
        --email admin@example.com &&
      playwright install chromium || true
      "


  # 🌐 AIRFLOW WEBSERVER
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8089:8080"
    depends_on:
      - airflow-init


  # 🧠 AIRFLOW SCHEDULER
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init


  # 📊 METABASE
  metabase:
    image: metabase/metabase:latest
    ports:
      - "3010:3000"
    volumes:
      - metabase_data:/metabase-data   # 🔥 FIX: persistence
    environment:
      - MB_DB_FILE=/metabase-data/metabase.db
    depends_on:
      postgres:
        condition: service_healthy


# 🔥 VOLUMES (WAJIB ADA)
volumes:
  postgres_data:
  metabase_data: