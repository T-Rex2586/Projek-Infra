
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres:5432/${AIRFLOW_DB_NAME}
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}

    AIRFLOW_CONN_DWH_CONN: postgresql://${DWH_DB_USER}:${DWH_DB_PASSWORD}@postgres-dwh:5432/${DWH_DB_NAME}

    AIRFLOW__CORE__PARALLELISM: "4"
    AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "2"
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "60"

    AIRFLOW__WEBSERVER__WORKERS: "2"
    AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: "300"

    PLAYWRIGHT_BROWSERS_PATH: /opt/ms-playwright

  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./freya:/opt/airflow/freya
  user: "${AIRFLOW_UID:-5000}:0"
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - infra-net
  restart: unless-stopped

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_DB_USER}"]
      interval: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - infra-net
    restart: unless-stopped

  postgres-dwh:
    image: postgres:13
    environment:
      POSTGRES_USER: ${DWH_DB_USER}
      POSTGRES_PASSWORD: ${DWH_DB_PASSWORD}
      POSTGRES_DB: ${DWH_DB_NAME}
    volumes:
      - postgres_dwh_data:/var/lib/postgresql/data
      - ./dwh_init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DWH_DB_USER}"]
      interval: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - infra-net
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD} \
      --firstname Admin --lastname User --role Admin --email admin@example.com || true
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1024M

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    deploy:
      resources:
        limits:
          memory: 1024M

  metabase:
    image: metabase/metabase:v0.52.6
    ports:
      - "3010:3000"
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    deploy:
      resources:
        limits:
          memory: 1024M
    depends_on:
      postgres-dwh:
        condition: service_healthy
    networks:
      - infra-net
    restart: unless-stopped

networks:
  infra-net:
    driver: bridge

volumes:
  postgres_data:
  postgres_dwh_data:
  metabase_data:
